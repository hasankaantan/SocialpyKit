name: Testing frontend

on:
  push:
    paths:
      - "ui/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "ui/**"
      - ".github/workflows/frontend.yml"

defaults:
  run:
    working-directory: ui

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Nuxt prepare
        run: bun run postinstall
      - name: ESLint
        run: bun run lint
      - name: Prettier
        run: bun run format:check

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Nuxt prepare
        run: bun run postinstall
      - name: nuxt typecheck
        run: bun run types

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Nuxt build
        run: bun run build
